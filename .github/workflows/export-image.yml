name: Export Docker Image

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and export image
        run: |
          docker pull ghcr.io/lairulan/sub2api:0.1.103
          docker save ghcr.io/lairulan/sub2api:0.1.103 | gzip > sub2api-0.1.103.tar.gz
          ls -lh sub2api-0.1.103.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.103
          files: sub2api-0.1.103.tar.gz
