name: Export Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to export (e.g., 0.1.104)'
        required: true
        type: string

permissions:
  contents: write
  packages: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and export image
        run: |
          VERSION=${{ github.event.inputs.version }}
          docker pull ghcr.io/lairulan/sub2api:${VERSION}
          docker save ghcr.io/lairulan/sub2api:${VERSION} | gzip > sub2api-${VERSION}.tar.gz
          ls -lh sub2api-${VERSION}.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: sub2api-${{ github.event.inputs.version }}.tar.gz
