name: Make Package Public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  make-public:
    runs-on: ubuntu-latest
    steps:
      - name: Make GHCR package public
        run: |
          # Get package info
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/sub2api")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Get package status: $HTTP_CODE"
          echo "$BODY" | jq .visibility

          # Change visibility to public
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/sub2api" \
            -d '{"visibility":"public"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Change visibility status: $HTTP_CODE"
          echo "$BODY" | jq .
